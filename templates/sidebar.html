        </div>
        <ul class="nav flex-column">

                <a class="nav-link text-white {% if request.endpoint == 'dashboard' %}active bg-primary{% endif %}"

                </a>
            </li>

                    {% endif %}
                </a>
            </li>
            <li class="nav-item">

                </a>

                <a class="nav-link text-white {% if request.endpoint in ['prescriptions', 'create_prescription', 'view_prescription'] %}active bg-primary{% endif %}"

                <a class="nav-link text-white {% if request.endpoint == 'symptom_dashboard' %}active bg-primary{% endif %}"

                <li class="nav-item">

                    </a>
                </li>

                    <a class="nav-link text-danger" href="{{ url_for('logout') }}"
